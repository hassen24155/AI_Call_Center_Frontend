<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Récupérer le mot de passe sur la plateforme ISGMATECH - Centre d'Appel Intelligent IA.">
  <title>Mot de passe oublié - ISGMATECH</title>
  
  <!-- Font Awesome for Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" integrity="sha512-iecdLmaskl7CVkqkXNQ/ZH/XLlvWZOJyj7Yy7tcenmpD1ypASozpmT/E0iPtmFIB46ZmdtAc9eNBvH0H/ZpiBw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
  
  <!-- Global Stylesheet -->
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="auth-body">

  <!-- Top bar actions: Language & Theme -->
  <div style="position: absolute; top: 24px; right: 24px; left: 24px; display: flex; justify-content: flex-end; gap: 16px; align-items: center; z-index: 10;">
    <div class="lang-switcher-container">
      <button class="lang-btn" id="langDropdownBtn">
        <i class="fa-solid fa-globe"></i>
        <span>Français</span>
        <i class="fa-solid fa-chevron-down" style="font-size: 0.7rem;"></i>
      </button>
      <div class="lang-dropdown" id="langDropdown">
        <button class="lang-option" data-lang="fr">
          <span>Français</span>
        </button>
        <button class="lang-option" data-lang="ar">
          <span>العربية</span>
        </button>
        <button class="lang-option" data-lang="hr">
          <span>الحسانية</span>
        </button>
      </div>
    </div>
    <button class="theme-toggle" id="themeToggleBtn" style="width: 42px; height: 42px; padding: 0; border-radius: 50%;">
      <i class="fa-solid fa-moon"></i>
    </button>
  </div>

  <div class="auth-container">
    <div class="glass-card auth-card">
      
      <!-- Logo Section -->
      <div class="auth-logo">
        <img src="assets/images/logo.png" alt="ISGMATECH Logo">
      </div>

      <div class="auth-header">
        <h1 data-i18n="auth-forgot-title">Récupération</h1>
        <p data-i18n="auth-forgot-subtitle">Entrez votre email pour recevoir les instructions de réinitialisation</p>
      </div>

      <form id="forgotForm" novalidate>
        
        <!-- Email Input -->
        <div class="form-group" style="margin-bottom: 24px;">
          <label for="email" data-i18n="auth-label-email">Adresse Email</label>
          <input type="email" id="email" placeholder="Ex: client@isgmatech.com" required>
        </div>

        <!-- Submit Button -->
        <button type="submit" class="btn btn-primary" style="width: 100%;">
          <span data-i18n="auth-btn-reset">Envoyer le lien de réinitialisation</span>
          <i class="fa-solid fa-paper-plane"></i>
        </button>

      </form>

      <!-- Auth Footer Link -->
      <div class="auth-footer-links">
        <a href="login.html" data-i18n="auth-back-login">Retour à la connexion</a>
      </div>

    </div>
  </div>

  <!-- Toast Notification Container -->
  <div id="toast-container"></div>

  <!-- Shared modules -->
  <script src="js/translations.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/main.js"></script>

  <!-- Page specific script logic -->
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const forgotForm = document.getElementById('forgotForm');
      
      forgotForm.addEventListener('submit', (e) => {
        e.preventDefault();
        
        const email = document.getElementById('email').value.trim();
        
        if (!email) {
          const emailErr = window.i18n.currentLang === 'fr' 
            ? "Veuillez entrer votre adresse email." 
            : "يرجى كتابة بريدك الإلكتروني.";
          window.showToast(emailErr, "danger");
          return;
        }
        
        if (!email.includes('@')) {
          const formatErr = window.i18n.currentLang === 'fr' 
            ? "Veuillez entrer une adresse email valide." 
            : "يرجى كتابة بريد إلكتروني صحيح.";
          window.showToast(formatErr, "danger");
          return;
        }
        
        const successMsg = window.i18n.currentLang === 'fr'
          ? "Si cet email existe, un lien de réinitialisation vous a été envoyé !"
          : "إذا كان البريد مسجلاً لدينا، فقد أرسلنا لك رابط استعادة كلمة السر!";
          
        window.showToast(successMsg, "success");
        
        setTimeout(() => {
          window.location.href = "login.html";
        }, 3000);
      });
    });
  </script>
</body>
</html>

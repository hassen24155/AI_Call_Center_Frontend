<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Suivi des demandes de transport du Centre d'Appel Intelligent.">
  <title>Suivi de Demande - Centre d'Appel Intelligent IA</title>
  
  <!-- Font Awesome for Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" integrity="sha512-iecdLmaskl7CVkqkXNQ/ZH/XLlvWZOJyj7Yy7tcenmpD1ypASozpmT/E0iPtmFIB46ZmdtAc9eNBvH0H/ZpiBw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
  
  <!-- Global Stylesheet -->
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <div class="app-container">
    
    <!-- Navigation Sidebar (Mounted dynamically by main.js) -->
    <aside class="sidebar" id="sidebar"></aside>

    <!-- Main Content Area -->
    <main class="main-content">
      
      <!-- Top Header (Mounted dynamically by main.js) -->
      <header class="top-header"></header>

      <div class="content-body">
        
        <!-- Header Text -->
        <div style="margin-bottom: 32px;">
          <h2 style="font-family: var(--font-title); font-size: 1.6rem; font-weight: 700; margin-bottom: 8px;" data-i18n="suivi-title">
            Suivi des Demandes
          </h2>
          <p class="subtitle" style="margin-bottom: 0;" data-i18n="suivi-subtitle">
            Consultez l'historique et l'état en temps réel de vos demandes de transport.
          </p>
        </div>

        <!-- Container for dynamically rendered transport items -->
        <div class="suivi-list-container" id="suiviList">
          
          <!-- Loading Indicator (will be replaced by suivi.js) -->
          <div style="text-align: center; padding: 48px;">
            <i class="fa-solid fa-spinner fa-spin" style="font-size: 2rem; color: var(--text-muted);"></i>
            <p style="margin-top: 12px; color: var(--text-muted);">Chargement de vos demandes...</p>
          </div>

        </div>
      </div>
    </main>

  </div>

  <!-- Toast Notification Container -->
  <div id="toast-container"></div>

  <!-- Global scripts -->
  <script src="js/translations.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/main.js"></script>

  <!-- Tracking specific script -->
  <script src="js/suivi.js"></script>
</body>
</html>

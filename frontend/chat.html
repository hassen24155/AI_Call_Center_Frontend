<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Interface de discussion en temps réel avec l'IA du Centre d'Appel.">
  <title>Chat IA - Centre d'Appel Intelligent IA</title>
  
  <!-- Font Awesome for Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" integrity="sha512-iecdLmaskl7CVkqkXNQ/ZH/XLlvWZOJyj7Yy7tcenmpD1ypASozpmT/E0iPtmFIB46ZmdtAc9eNBvH0H/ZpiBw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
  
  <!-- Global Stylesheet -->
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <div class="app-container">
    
    <!-- Navigation Sidebar (Mounted dynamically by main.js) -->
    <aside class="sidebar" id="sidebar"></aside>

    <!-- Main Content Area -->
    <main class="main-content">
      
      <!-- Top Header (Mounted dynamically by main.js) -->
      <header class="top-header"></header>

      <div class="content-body">
        <div class="chat-wrapper">
          
          <!-- Chat Messages Box -->
          <div class="chat-box" id="chatBox">
            <!-- Simulated greeting from IA -->
            <div class="chat-message ai">
              <div class="chat-bubble">
                <span data-i18n="chat-welcome">Bonjour ! Je suis l'assistant virtuel ISGMATECH. Comment puis-je vous aider aujourd'hui ? Vous pouvez me poser des questions ou me demander de planifier un transport.</span>
                <button class="ai-message-tts" onclick="speakMessage(this)" title="Écouter le message">
                  <i class="fa-solid fa-volume-high"></i>
                </button>
              </div>
              <div class="chat-meta">IA • <span style="font-style: italic;">justnow</span></div>
            </div>
          </div>

          <!-- Attachment Preview Container -->
          <div id="attachmentPreview" style="display: none;">
            <!-- Rendered dynamically by chat.js -->
          </div>

          <!-- Suggestion Chips Container -->
          <div class="suggestion-chips" id="suggestionChips">
            <button class="chip-btn" data-prompt-key="chat-suggest-1" data-i18n="chat-suggest-1">Planifier un transport VIP</button>
            <button class="chip-btn" data-prompt-key="chat-suggest-2" data-i18n="chat-suggest-2">Où en est ma demande ?</button>
            <button class="chip-btn" data-prompt-key="chat-suggest-3" data-i18n="chat-suggest-3">Comment fonctionne le dashboard ?</button>
            <button class="chip-btn" data-prompt-key="chat-suggest-4" data-i18n="chat-suggest-4">Contacter un agent humain</button>
          </div>

          <!-- Chat Input Controls -->
          <div class="chat-controls">
            <div class="chat-input-container">
              <input type="text" id="chatInput" class="chat-input" placeholder="Écrivez votre message ici..." aria-label="Message pour l'IA" data-i18n="chat-input-placeholder">
              <div class="chat-input-buttons">
                
                <!-- Attachment Button -->
                <button type="button" id="attachBtn" class="chat-btn" title="Joindre un fichier">
                  <i class="fa-solid fa-paperclip"></i>
                </button>
                <input type="file" id="fileInput" style="display: none;">

                <!-- Microphone Button for Simulated Voice Input -->
                <button type="button" id="micBtn" class="chat-btn chat-btn-mic" title="Entrée vocale">
                  <i class="fa-solid fa-microphone"></i>
                </button>

              </div>
            </div>
            
            <!-- Send Button -->
            <button type="button" id="sendBtn" class="chat-btn chat-btn-send" title="Envoyer le message">
              <i class="fa-solid fa-paper-plane"></i>
            </button>
          </div>

        </div>
      </div>
    </main>

  </div>

  <!-- Toast Notification Container -->
  <div id="toast-container"></div>

  <!-- Global modules -->
  <script src="js/translations.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/main.js"></script>
  
  <!-- Chat Page specific module -->
  <script src="js/chat.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Formulaire de demande de transport du Centre d'Appel Intelligent.">
  <title>Demande de Transport - Centre d'Appel Intelligent IA</title>
  
  <!-- Font Awesome for Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" integrity="sha512-iecdLmaskl7CVkqkXNQ/ZH/XLlvWZOJyj7Yy7tcenmpD1ypASozpmT/E0iPtmFIB46ZmdtAc9eNBvH0H/ZpiBw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
  
  <!-- Global Stylesheet -->
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <div class="app-container">
    
    <!-- Navigation Sidebar (Mounted dynamically by main.js) -->
    <aside class="sidebar" id="sidebar"></aside>

    <!-- Main Content Area -->
    <main class="main-content">
      
      <!-- Top Header (Mounted dynamically by main.js) -->
      <header class="top-header"></header>

      <div class="content-body">
        <div class="form-container">
          
          <div class="glass-card">
            <h2 style="font-family: var(--font-title); font-size: 1.4rem; font-weight: 700; margin-bottom: 8px;" data-i18n="trans-form-title">
              Formuler une demande de trajet
            </h2>
            <p class="subtitle" style="margin-bottom: 24px;" data-i18n="trans-form-subtitle">
              Remplissez le formulaire ci-dessous pour soumettre une demande de réservation de transport. L'administrateur validera votre demande rapidement.
            </p>

            <form id="transportForm" novalidate>
              
              <!-- Nom Complet -->
              <div class="form-group">
                <label for="fullName"><i class="fa-solid fa-user"></i> <span data-i18n="trans-label-name">Nom Complet</span></label>
                <input type="text" id="fullName" placeholder="Ex: Jean Dupont" required>
              </div>

              <!-- Téléphone -->
              <div class="form-group">
                <label for="phone"><i class="fa-solid fa-phone"></i> <span data-i18n="trans-label-phone">Numéro de Téléphone</span></label>
                <input type="tel" id="phone" placeholder="Ex: 06 12 34 56 78" required>
              </div>

              <!-- Adresse de Départ -->
              <div class="form-group">
                <label for="departure"><i class="fa-solid fa-location-dot"></i> <span data-i18n="trans-label-departure">Adresse de Départ</span></label>
                <input type="text" id="departure" placeholder="Ex: Gare de Lyon, Paris" required>
              </div>

              <!-- Destination -->
              <div class="form-group">
                <label for="destination"><i class="fa-solid fa-flag-checkered"></i> <span data-i18n="trans-label-destination">Destination (Arrivée)</span></label>
                <input type="text" id="destination" placeholder="Ex: Aéroport CDG, Roissy" required>
              </div>

              <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px;">
                <!-- Catégorie de transport -->
                <div class="form-group">
                  <label for="category"><i class="fa-solid fa-layer-group"></i> <span data-i18n="trans-label-category">Catégorie de Transport</span></label>
                  <select id="category" style="background: var(--bg-secondary); border: 1px solid var(--border-color); border-radius: 12px; padding: 14px 18px; color: var(--text-primary); font-family: var(--font-body); font-size: 0.95rem; cursor: pointer;">
                    <option value="Standard" data-i18n="trans-cat-standard">Standard</option>
                    <option value="Confort" data-i18n="trans-cat-comfort">Confort</option>
                    <option value="VIP" data-i18n="trans-cat-vip">VIP</option>
                    <option value="Cargo" data-i18n="trans-cat-cargo">Cargo</option>
                    <option value="Medical" data-i18n="trans-cat-medical">Médical</option>
                  </select>
                </div>

                <!-- Niveau de Priorité -->
                <div class="form-group">
                  <label for="priority"><i class="fa-solid fa-circle-exclamation"></i> <span data-i18n="trans-label-priority">Niveau de Priorité</span></label>
                  <select id="priority" style="background: var(--bg-secondary); border: 1px solid var(--border-color); border-radius: 12px; padding: 14px 18px; color: var(--text-primary); font-family: var(--font-body); font-size: 0.95rem; cursor: pointer;">
                    <option value="Low" data-i18n="trans-priority-low">Faible</option>
                    <option value="Medium" data-i18n="trans-priority-medium" selected>Moyenne</option>
                    <option value="High" data-i18n="trans-priority-high">Haute</option>
                    <option value="Urgent" data-i18n="trans-priority-urgent">Urgent</option>
                  </select>
                </div>
              </div>

              <!-- Date et Heure de départ -->
              <div class="form-group" style="margin-bottom: 24px;">
                <label for="dateTime"><i class="fa-solid fa-calendar-day"></i> <span data-i18n="trans-label-datetime">Date & Heure de départ</span></label>
                <input type="datetime-local" id="dateTime" required style="cursor: pointer;">
              </div>

              <!-- Submit Button -->
              <button type="submit" class="btn btn-primary" id="submitFormBtn">
                <span data-i18n="trans-btn-submit">Envoyer la demande</span>
                <i class="fa-solid fa-paper-plane"></i>
              </button>

            </form>
          </div>

        </div>
      </div>
    </main>

  </div>

  <!-- Toast Notification Container -->
  <div id="toast-container"></div>

  <!-- Shared modules -->
  <script src="js/translations.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/main.js"></script>

  <!-- Form specific logic -->
  <script src="js/transport.js"></script>
</body>
</html>
